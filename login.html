<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href= "https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet" >
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h1>
        
        <form id="loginForm" action="/src/login" method="post" class="space-y-4">
            <div>
                <label for="userInput" class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
                <input type="text" id="userInput" name="username" required autocomplete="username" 
                       class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div>
                <label for="passInput" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="passInput" name="password" required autocomplete="current-password" 
                       class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <button type="submit" class="w-full p-3 bg-blue-500 text-white rounded hover:bg-blue-600 transition duration-200">
                Login
            </button>
            
            <a href="register.html" class="block text-center w-full p-3 mt-4 bg-gray-200 text-gray-800 rounded hover:bg-gray-300 transition duration-200">
                Register
            </a>
            
            <a href="#" class="block text-center mt-4 text-sm text-blue-500 hover:underline">
                Forgot Password?
            </a>
        </form>
    </div>
</body>
</html>
