<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href= "https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet" >
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-md shadow-sm border border-gray-100 w-full max-w-sm">
        <h1 class="text-center text-xl font-bold text-gray-800 mb-6">Register</h1>
        <form>
            
            <input type="text" placeholder="Username" class="w-full p-2.5 mb-4 border border-gray-100 rounded text-gray-700 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" required />
            <input type="email" id="emailInput" placeholder="email@example.com" class="w-full p-2.5 mb-4 border border-gray-100 rounded text-gray-700 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" required />
            <input type="password" id="passInput" placeholder="Password" class="w-full p-2.5 mb-4 border border-gray-100 rounded text-gray-700 text-lg tracking-widest focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" required />
            <input type="password" id="confirmPassInput" placeholder="Password" class="w-full p-2.5 mb-4 border border-gray-100 rounded text-gray-700 text-lg tracking-widest focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" required />
            
            <div class="mb-6">
                <label for="dateInput" class="block text-xs font-semibold text-gray-500 mb-1.5">Date of Birth</label>
                <input type="date" id="dateInput" class="w-full p-2.5 border border-gray-100 rounded text-gray-600 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" required />
            </div>

            <button type="submit" class="w-full p-2.5 bg-blue-500 text-white rounded text-sm hover:bg-blue-600 transition-colors mb-4">Register</button>
            <a href="login.html" class="block text-center w-full text-xs text-blue-400 hover:text-blue-600 transition-colors">Already have an account? Login</a>
        </form>
    </div>
</body>
</html>
